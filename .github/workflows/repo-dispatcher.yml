name: Repo Dispatcher

on:
  schedule:
    - cron: "0 12 * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:
    inputs:
      param:
        description: "Optional flags: pkg, nocache, noser, notg, cw"
        required: false
        default: ""
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: repo-dispatcher
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch x86_64 build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      PARAM: ${{ inputs.param || '' }}

    steps:
      - name: Validate options
        run: |
          set -Eeuo pipefail
          if [[ ! "$PARAM" =~ ^[[:alnum:]_.[:space:]-]*$ ]]; then
            echo "::error::Options contain unsupported characters"
            exit 1
          fi

      - name: Cancel running workflows
        if: contains(inputs.param, 'cw')
        uses: styfle/cancel-workflow-action@d07a454dad7609a92316b57b23c9ccfd4f59af66
        with:
          workflow_id: all
          access_token: ${{ github.token }}

      - name: Trigger package feed update
        continue-on-error: true
        env:
          REPO_TOKEN: ${{ secrets.TOKEN_MGZ0227 }}
        run: |
          set -Eeuo pipefail
          if [[ -z "$REPO_TOKEN" ]]; then
            echo "::warning::TOKEN_MGZ0227 is not configured; package update skipped"
            exit 0
          fi

          api="https://api.github.com/repos/mgz0227/OP-Packages"
          headers=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer $REPO_TOKEN"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )
          status="$(curl --fail-with-body --silent --show-error --retry 3 "${headers[@]}" "$api/actions/runs?per_page=1" |
            jq -r '.workflow_runs[0].status // "unknown"')"

          if [[ "$status" == "queued" || "$status" == "in_progress" ]]; then
            echo "Package feed update is already $status"
            exit 0
          fi

          curl --fail-with-body --silent --show-error --retry 3 -X POST "${headers[@]}" --data '{"event_type":"update"}' "$api/dispatches"

      - name: Trigger firmware build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          event_type="x86_64"
          [[ -z "$PARAM" ]] || event_type="$event_type $PARAM"
          payload="$(jq -cn --arg event_type "$event_type" '{event_type: $event_type, client_payload: {target: "x86_64"}}')"

          curl --fail-with-body --silent --show-error --retry 3 -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GH_TOKEN" -H "X-GitHub-Api-Version: 2022-11-28" --data "$payload" "https://api.github.com/repos/${GITHUB_REPOSITORY}/dispatches"
