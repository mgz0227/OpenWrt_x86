name: Build OpenWrt

on: 
  repository_dispatch:

env:
  REPO_TOKEN: ${{ secrets.TOKEN_MGZ0227 }}
  PPPOE_USERNAME: ${{ secrets.PPPOE_USERNAME }}
  PPPOE_PASSWD: ${{ secrets.PPPOE_PASSWD }}
  SCKEY: ${{ secrets.SCKEY }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  DOCKER_ID: ${{ secrets.DOCKER_ID }}
  DOCKER_PASSWD: ${{ secrets.DOCKER_PASSWD }}
  GIT_TERMINAL_PROMPT: "0"
  GIT_HTTP_LOW_SPEED_LIMIT: "1024"
  GIT_HTTP_LOW_SPEED_TIME: "60"
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    #runs-on: self-hosted
    
    name: Build ${{matrix.target}}
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64]
        
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
          fetch-depth: 0

    # - name: Set up secret file
      # run: |
        # echo ${{ secrets.TELEGRAM_CHAT_ID }} | sed 's/./& /g'
        # echo ${{ secrets.TELEGRAM_TOKEN }} | sed 's/./& /g'

    - name: Load Settings.ini
      run: |
        echo ${{matrix.target}}
        source "${{ github.workspace }}/devices/common/settings.ini"
        if [ -f "devices/${{matrix.target}}/settings.ini" ]; then
          source "${{ github.workspace }}/devices/${{matrix.target}}/settings.ini"
        fi
        echo "REPO_URL=${REPO_URL}" >> $GITHUB_ENV
        echo "REPO_BRANCH=${REPO_BRANCH}" >> $GITHUB_ENV
        echo "CONFIG_FILE=${CONFIG_FILE}" >> $GITHUB_ENV
        echo "DIY_SH=${DIY_SH}" >> $GITHUB_ENV
        echo "FREE_UP_DISK=${FREE_UP_DISK}" >> $GITHUB_ENV
        echo "UPLOAD_BIN_DIR_FOR_ARTIFACT=${UPLOAD_BIN_DIR_FOR_ARTIFACT}" >> $GITHUB_ENV
        echo "UPLOAD_FIRMWARE_FOR_ARTIFACT=${UPLOAD_FIRMWARE_FOR_ARTIFACT}" >> $GITHUB_ENV
        echo "UPLOAD_FIRMWARE_FOR_RELEASE=${UPLOAD_FIRMWARE_FOR_RELEASE}" >> $GITHUB_ENV
        echo "UPLOAD_FIRMWARE_TO_COWTRANSFER=${UPLOAD_FIRMWARE_TO_COWTRANSFER}" >> $GITHUB_ENV
        echo "UPLOAD_FIRMWARE_TO_WETRANSFER=${UPLOAD_FIRMWARE_TO_WETRANSFER}" >> $GITHUB_ENV
        if [ ${{matrix.target}} == "x86_64" ]; then
            echo "ARCH=linux/amd64" >> $GITHUB_ENV
            echo "MTARGET=x86_64" >> $GITHUB_ENV
        fi

    - name: Trigger Packages Update
      continue-on-error: true
      if: contains(github.event.action, 'pkg')
      run: |
        status=$(curl -H "Authorization: token ${{ secrets.TOKEN_MGZ0227 }}" -s "https://api.github.com/repos/mgz0227/OP-Packages/actions/runs" | jq -r '.workflow_runs[0].status')
        if [[ "$status" == "completed" ]]; then
          curl -X POST https://api.github.com/repos/mgz0227/OP-Packages/dispatches \
            -H "Accept: application/vnd.github.everest-preview+json" \
            -H "Authorization: token ${{ secrets.TOKEN_MGZ0227 }}" \
          --data '{"event_type": "update"}'
        fi

    - name: Free disk space
      uses: coder-xiaomo/free-disk-space@14d098403ea40da32e17b647317b09061853e911 # v1.4.0
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
        gcc-multilib gcc g++-multilib gettext git libncurses-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget \
        libboost-system-dev libboost-filesystem-dev libpcre3-dev libv4l-dev \
        llvm python3-pyelftools libpython3-dev aria2 jq qemu-utils ccache rename \
        libelf-dev device-tree-compiler libgmp3-dev libmpc-dev libfuse-dev dwarves
        sudo -E apt-get -qq clean

        sudo timedatectl set-timezone "Asia/Shanghai"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"

    - name: Get current date
      id: date
      run: |
        echo "date=$(date +'%d.%m.%Y_%H-%M')" >> $GITHUB_ENV
        echo "date2=$(date +'%m/%d %Y')" >> $GITHUB_ENV
        VERSION="$(echo "${{github.event.action}}" | grep -Eo " [0-9.]+" | sed -e 's/ //')" || true
        [ "$VERSION" ] && echo "VERSION=$VERSION" >> $GITHUB_ENV || echo "VERSION=$(date +'%m.%d')" >> $GITHUB_ENV

    - name: Clone source code
      run: |
        set -euo pipefail
        git clone --branch "$REPO_BRANCH" "$REPO_URL" openwrt
    
    - name: Free up disk space
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo mkdir -p -m 777 /mnt/openwrt/dl /mnt/openwrt/staging_dir /mnt/openwrt/build_dir
        ln -sf /mnt/openwrt/dl openwrt/dl
        ln -sf /mnt/openwrt/staging_dir openwrt/staging_dir
        ln -sf /mnt/openwrt/build_dir openwrt/build_dir

    - name: Load custom configuration
      run: |
        function git_clone_path() {
          trap 'rm -rf "$tmpdir"' EXIT
          branch="$1" rurl="$2" mv="$3"
          [[ "$mv" != "mv" ]] && shift 2 || shift 3
          rootdir="$PWD"
          tmpdir="$(mktemp -d)" || exit 1
          if [ ${#branch} -lt 10 ]; then
          git clone -b "$branch" --depth 1 --filter=blob:none --sparse "$rurl" "$tmpdir"
          cd "$tmpdir"
          else
          git clone --filter=blob:none --sparse "$rurl" "$tmpdir"
          cd "$tmpdir"
          git checkout $branch
          fi
          if [ "$?" != 0 ]; then
            echo "error on $rurl"
            return 0
          fi
          git sparse-checkout init --cone
          git sparse-checkout set $@
          [[ "$mv" != "mv" ]] && cp -rn ./* $rootdir/ || mv -n $@/* $rootdir/$@/
          cd $rootdir
          }
        export -f git_clone_path
        cp -rf devices/common/. openwrt/
        cp -rf devices/${{matrix.target}}/. openwrt/
        cp -rf devices openwrt/
        cd openwrt
        chmod +x devices/common/$DIY_SH
        /bin/bash "devices/common/$DIY_SH"
        cp -f devices/common/$CONFIG_FILE .config
        if [ -f "devices/${{matrix.target}}/$CONFIG_FILE" ]; then
          echo >> .config
          cat devices/${{matrix.target}}/$CONFIG_FILE >> .config
        fi
        if [ -f "devices/${{matrix.target}}/$DIY_SH" ]; then
          chmod +x devices/${{matrix.target}}/$DIY_SH
          echo "/bin/bash devices/${{matrix.target}}/$DIY_SH"
          /bin/bash "devices/${{matrix.target}}/$DIY_SH"
        fi
        cp -Rf ./diy/* ./ || true

    - name: Apply patches
      run: |
        set -euo pipefail
        cd openwrt
        patch_dir="devices/${{matrix.target}}/patches"
        cp -r --update=none devices/common/patches/. "$patch_dir/"

        while IFS= read -r -d '' file; do
          git apply "$file"
        done < <(find "$patch_dir" -maxdepth 1 -type f -name '*.bin.patch' -print0 | sort -z)

        while IFS= read -r -d '' file; do
          patch -d './' -R --no-backup-if-mismatch --merge -p1 --forward < "$file"
        done < <(find "$patch_dir" -maxdepth 1 -type f -name '*.revert.patch' -print0 | sort -z)

        while IFS= read -r -d '' file; do
          patch -d './' --no-backup-if-mismatch --merge -p1 --forward < "$file"
        done < <(find "$patch_dir" -maxdepth 1 -type f -name '*.patch' ! -name '*.revert.patch' ! -name '*.bin.patch' -print0 | sort -z)

        find feeds -path '*/adguardhome/files/adguardhome.init' -delete
        for config in target/linux/x86/config-* target/linux/generic/config-*; do
          [[ -f "$config" ]] || continue
          cat >> "$config" <<'EOF'
        CONFIG_CPU_FREQ_GOV_POWERSAVE=y
        CONFIG_CPU_FREQ_GOV_USERSPACE=y
        CONFIG_CPU_FREQ_GOV_ONDEMAND=y
        CONFIG_CPU_FREQ_GOV_CONSERVATIVE=y
        CONFIG_CRYPTO_CHACHA20POLY1305=y
        CONFIG_FAT_DEFAULT_IOCHARSET="utf8"
        EOF
        done

    - name: Write custom APK keys
      run: |
        cd openwrt

        cat > private-key.pem <<'EOF'
        ${{ secrets.APK_PRIVATE_KEY }}
        EOF

        cat > public-key.pem <<'EOF'
        ${{ secrets.APK_PUBLIC_KEY }}
        EOF

        chmod 600 private-key.pem
        ls -l private-key.pem public-key.pem

    - name: Defconfig
      run: |
        cd openwrt
        make defconfig
        if [[ ! "${{matrix.target}}" =~ (amlogic_*|armsr_armv8|bcm27xx_*|rockchip_armv8|sunxi_*|x86_*) ]]; then
        sed -n '/# Wireless Drivers/,/# end of Wireless Drivers/p' .config | sed -e 's/=m/=n/' >>.config
        sed -i "s/\(kmod-qca.*\)=m/\1=n/" .config
        if [[ "${{matrix.target}}" == "rockchip_rk35xx" ]]; then 
            sed -n '/# Video Support/,/# end of Video Support/p' .config | sed -e 's/=m/=n/' >>.config
        fi

        make defconfig
        #make oldconfig
        fi
        cat .config
        
    - name: Check key files in TOPDIR
      run: |
        cd openwrt
        pwd
        ls -l private-key.pem public-key.pem
        grep -E 'CONFIG_SIGNED_PACKAGES|CONFIG_PACKAGE_openwrt-keyring|CONFIG_SIGNATURE_CHECK' .config || true

        
    - name: Get kernel version
      id: kernel
      run: |
        set -euo pipefail
        cd openwrt
        KERNEL_PATCHVER="$(sed -n 's/^KERNEL_PATCHVER:=//p' target/linux/x86/Makefile | head -n 1)"
        KERNEL_FILE="target/linux/generic/kernel-$KERNEL_PATCHVER"
        [[ -n "$KERNEL_PATCHVER" && -f "$KERNEL_FILE" ]]
        PATCH_VER="$(grep -m1 "^LINUX_VERSION-$KERNEL_PATCHVER" "$KERNEL_FILE" | cut -d= -f2 | tr -d ' .')"
        [[ -n "$PATCH_VER" ]]
        KERNEL_FULL="$KERNEL_PATCHVER.$PATCH_VER"
        echo "KERNEL_VER=$KERNEL_FULL" >> $GITHUB_ENV
        echo "Kernel full version detected: $KERNEL_FULL"

 #   - name: Download package
 #     id: package
 #     run: |
 #       cd openwrt
 #       make download -j$(($(nproc)+1)) &
  #      sleep 5

    - name: Cache
      uses: stupidloud/cachewrtbuild@b729f807837dbc3455d02fd35192660d9b662121
      with:
        ccache: 'true'
        mixkey: ${{ matrix.target }}
        clean: ${{ contains(github.event.action, 'nocache') }}
        prefix: ${{ github.workspace }}/openwrt
    
    - name: Check space usage
      run: |
        shopt -s extglob
        cd openwrt
        if find staging_dir -maxdepth 2 -type d -path "*${{ env.MTARGET }}*/bin" -print -quit | grep -q .; then
            rm -rvf staging_dir/!(*${{ env.MTARGET }}*|host|hostpkg) build_dir/!(*${{ env.MTARGET }}*|host|hostpkg)
        fi
        df -hT


    - name: Compile the firmware
      id: compile
      run: |
        shopt -s extglob
        cd openwrt
        echo -e "$(($(nproc)+1)) thread compile"
        #make -j1 V=sc
        make -j$(($(nproc)+1)) || { log=$(mktemp);make V=s &>$log; } || { tail -50 $log; curl -k --data chat_id="${{ env.TELEGRAM_CHAT_ID }}" --data "text=❌ OpenWrt ${{ env.VERSION }} ${{matrix.target}} 编译失败 😂" "https://api.telegram.org/bot${{ env.TELEGRAM_TOKEN }}/sendMessage";df -hT;exit 1; }
        #make -j1 V=sc || make V=sc &>build.log || {tail -50 build.log; curl -k --data chat_id="${{ env.TELEGRAM_CHAT_ID }}" --data "text=❌ OpenWrt ${{ env.VERSION }} ${{matrix.target}} 编译失败 😂" "https://api.telegram.org/bot${{ env.TELEGRAM_TOKEN }}/sendMessage";df -hT;exit 1;}
        sed -i "s/# CONFIG_IB is not set/CONFIG_IB=y/" .config
        rm -rf staging_dir/toolchain-*/bin/*openwrt-linux-musl-lto-dump
        rm -rf staging_dir/toolchain-*/initial
        df -hT

    


    - name: Organize files
      id: organize
      continue-on-error: true
      run: |
                shopt -s extglob
                cd openwrt/bin/targets/*/*/
                cp $GITHUB_WORKSPACE/openwrt/.config ${{matrix.target}}.config || true
                cp $GITHUB_WORKSPACE/openwrt/build_dir/target-*/linux-*/linux-*/.config ${{matrix.target}}_kernel.config || true
                Emoji=("🎉" "🤞" "✨" "🎁" "🎈" "🎄" "🎨" "💋" "🍓" "🍕" "🍉" "💐" "🌴" "🚀" "🛸" "🗽" "⛅" "🌈" "🔥" "⛄" "🐶" "🏅" "🦄" "🐤")
                echo "EMOJI=${Emoji[$[$RANDOM % ${#Emoji[@]}]]}" >> $GITHUB_ENV
                # Unzip .gz files
             #   for file in *.gz; do
            #      gunzip "$file"
           #     done
        
                 # Rename all files, including IMG files after decompression
          #      find . -type f -name "meowwrt-*" -exec rename "s/meowwrt-/MeowWrt-${{ env.VERSION }}.2025-/" {} + || true
        
                # Recompress all IMG files back to .gz format
         #       for file in *.img; do
         #       gzip "$file"
        #        done
                


                
    - name: Organize Release files
      id: organizeRelease
      continue-on-error: true
      run: |
              shopt -s extglob
              mkdir -p firmware/${{matrix.target}}          
              cp -rf openwrt/bin/targets/*/*/*{combined,imagebuilder,rootfs,256}* ./firmware/${{matrix.target}}/ || true
              cp -rf openwrt/bin/targets/*/*/*.bin* ./firmware/${{matrix.target}}/ || true
                Emoji=("🎉" "🤞" "✨" "🎁" "🎈" "🎄" "🎨" "💋" "🍓" "🍕" "🍉" "💐" "🌴" "🚀" "🛸" "🗽" "⛅" "🌈" "🔥" "⛄" "🐶" "🏅" "🦄" "🐤")
                echo "EMOJI=${Emoji[$[$RANDOM % ${#Emoji[@]}]]}" >> $GITHUB_ENV
                if [ ${{matrix.target}} == "x86_64" ]; then
                echo "DOCKERTAG=${{ secrets.DOCKER_ID }}/openwrt-nginx:latest" >> $GITHUB_ENV
                fi

    - name: Network test
      run: |
        echo "Runner:"
        curl ip-api.com/json
        echo "\n"
        echo "=== HK SSH ==="
        timeout 5 bash -c "</dev/tcp/${{ secrets.SERVER_HOST }}/${{ secrets.SERVER_PORT }}" \
          && echo "SSH OK" \
          || echo "SSH FAIL"

        echo "=== CN SSH ==="
        timeout 5 bash -c "</dev/tcp/${{ secrets.HOST }}/${{ secrets.PORT }}" \
          && echo "SSH OK" \
          || echo "SSH FAIL"

    - name: Deploy imagebuilder to Ubuntuserver
      uses: easingthemes/ssh-deploy@2cc5b27bf3029d0455dd5e09fe02633904031447 # v6.0.3
      continue-on-error: true
      if: env.SSH_PRIVATE_KEY && ! contains(github.event.action, 'noser')
      with:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        ARGS: >-
          -avzr
          --exclude='*erofs*'
          --exclude='*squashfs*'
          --exclude='*targz*'
          --exclude='*imagebuilder*'
        SOURCE: openwrt/bin/targets
        REMOTE_HOST: ${{ secrets.HOST }}
        REMOTE_PORT: ${{ secrets.PORT }}
        REMOTE_USER: ${{ secrets.SERVER_USERNAME }}
        TARGET: "/www/wwwroot/op.miaogongzi.cc/25.12"

    - name: Upload firmware for artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: env.UPLOAD_FIRMWARE_FOR_ARTIFACT == 'true'
      with:
        name: ${{ env.VERSION }}_${{matrix.target}}
        path: |
          openwrt/bin/targets/

    - name: Create release
      id: create_release
      if: env.REPO_TOKEN && env.UPLOAD_FIRMWARE_FOR_RELEASE == 'true'
      continue-on-error: true
      env:
        WETRANS: ${{ env.WETRANS }}
        COWURL: ${{ env.COWURL }}
        NOTICE: ${{ env.NOTICE }}
      run: |
        printf '墙内加速下载:\n\n' >> release.txt
        printf '[CDN](https://op.miaogongzi.cc/25.12/targets/x86/64/)\n\n' >> release.txt
        [[ -z "$WETRANS" ]] || printf '[WeTransfer](%s)\n\n' "$WETRANS" >> release.txt
        [[ -z "$COWURL" ]] || printf '[奶牛快传](%s)\n\n' "$COWURL" >> release.txt
        [[ -z "$NOTICE" ]] || printf '%s\n' "$NOTICE" >> release.txt

    - name: Upload firmware for release
      uses: softprops/action-gh-release@2bb465e97f322d3cb2a965294d483e0d26a67aa9 # v3.0.1
      continue-on-error: true
      if: env.REPO_TOKEN && env.UPLOAD_FIRMWARE_FOR_RELEASE == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.TOKEN_MGZ0227 }}
      with:
        files: |
            firmware/${{matrix.target}}/*
            openwrt/error*.log
        name: ${{ env.date2 }} ${{matrix.target}} KERNEL:${{ env.KERNEL_VER }} ${{ env.EMOJI }}
        tag_name: ${{ env.date }}_${{matrix.target}}
        body_path: release.txt
    
    - name: Deploy imagebuilder to server
      uses: easingthemes/ssh-deploy@2cc5b27bf3029d0455dd5e09fe02633904031447 # v6.0.3
      continue-on-error: true
      if: env.SSH_PRIVATE_KEY && ! contains(github.event.action, 'noser')
      with:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        ARGS: "-avr --timeout=600 "
        SSH_CMD_ARGS: "-o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o StrictHostKeyChecking=no"
        SOURCE: openwrt/bin/targets
        REMOTE_HOST: ${{ secrets.SERVER_HOST }}
        REMOTE_PORT: ${{ secrets.SERVER_PORT }}
        REMOTE_USER: ${{ secrets.SERVER_USERNAME }}
        TARGET: "/www/wwwroot/op.miaogongzi.cc/25.12"


    - name: WeChat notification
      continue-on-error: true
      if: env.SCKEY
      run: |
        # [ steps.compile.outputs.status == 'success' ] && curl https://sctapi.ftqq.com/${{ secrets.SCKEY }}.send?text=🎉OpenWrt_${{ env.VERSION }}_${{matrix.target}}编译完成😋|| curl https://sctapi.ftqq.com/${{ secrets.SCKEY }}.send?text=❌OpenWrt_${{ env.VERSION }}_${{matrix.target}}编译失败😂

    - name: Telegram notification
      if: env.TELEGRAM_TOKEN && ! contains(github.event.action, 'notg')
      continue-on-error: true
      run: |
        curl -k --data chat_id="${{ env.TELEGRAM_CHAT_ID }}" --data "text=🎉 OpenWrt ${{ env.VERSION }} ${{matrix.target}} 编译成功 😋  https://dl.openwrt.ai/firmware/${{matrix.target}}/  ${{ env.COWURL }}   ${{ env.WETRANS }} 🚀" "https://api.telegram.org/bot${{ env.TELEGRAM_TOKEN }}/sendMessage"

    - name: Delete workflow runs
      uses: mgz0227/delete-workflow-runs@09cf4452c0d19a5190fc977d9bacae384e0de9a8 # v1.0
      continue-on-error: true
      with:
        token: ${{ secrets.TOKEN_MGZ0227 }}
        retain_days: 100
        keep_minimum_runs: 0

    - name: Remove old Releases
      uses: mgz0227/delete-older-releases@dfbe6be2a006e9475dfcbe5b8d201f1824c2a9fe # v0.3.4
      continue-on-error: true
      if: env.UPLOAD_FIRMWARE_FOR_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 15
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.TOKEN_MGZ0227 }}
