name: Build OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      options:
        description: "Optional flags: pkg, nocache, noser, notg"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: openwrt-x86_64
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Load build settings
        env:
          TARGET: x86_64
          EVENT_TARGET: ${{ github.event.client_payload.target || 'x86_64' }}
          BUILD_OPTIONS: ${{ github.event_name == 'repository_dispatch' && github.event.action || inputs.options || '' }}
        run: |
          set -Eeuo pipefail

          if [[ "$EVENT_TARGET" != "x86_64" ]]; then
            echo "::error::Only x86_64 is supported: $EVENT_TARGET"
            exit 1
          fi

          if [[ ! "$BUILD_OPTIONS" =~ ^[[:alnum:]_.[:space:]-]*$ ]]; then
            echo "::error::Build options contain unsupported characters"
            exit 1
          fi

          # shellcheck source=devices/common/settings.ini
          source "devices/common/settings.ini"

          required_settings=(
            REPO_URL REPO_BRANCH KERNEL_SOURCE_REF KERNEL_PACKAGES_SOURCE_REF CONFIG_FILE DIY_SH
            FREE_UP_DISK UPLOAD_FIRMWARE_FOR_ARTIFACT
            UPLOAD_FIRMWARE_FOR_RELEASE
          )
          for name in "${required_settings[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing setting: $name"
              exit 1
            fi
            printf '%s=%s\n' "$name" "${!name}" >> "$GITHUB_ENV"
          done

          {
            printf 'TARGET=%s\n' "$TARGET"
            printf 'BUILD_OPTIONS=%s\n' "$BUILD_OPTIONS"
          } >> "$GITHUB_ENV"

      - name: Detect optional integrations
        env:
          RELEASE_TOKEN: ${{ secrets.TOKEN_MGZ0227 }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -Eeuo pipefail
          [[ -z "$RELEASE_TOKEN" ]] || echo "HAS_RELEASE_TOKEN=true" >> "$GITHUB_ENV"
          [[ -z "$SSH_KEY" ]] || echo "HAS_SSH_KEY=true" >> "$GITHUB_ENV"
          if [[ -n "$TELEGRAM_TOKEN" && -n "$TELEGRAM_CHAT_ID" ]]; then
            echo "HAS_TELEGRAM=true" >> "$GITHUB_ENV"
          fi

      - name: Trigger package feed update
        if: contains(env.BUILD_OPTIONS, 'pkg')
        continue-on-error: true
        env:
          REPO_TOKEN: ${{ secrets.TOKEN_MGZ0227 }}
        run: |
          set -Eeuo pipefail
          if [[ -z "$REPO_TOKEN" ]]; then
            echo "::warning::TOKEN_MGZ0227 is not configured; package update skipped"
            exit 0
          fi

          api="https://api.github.com/repos/mgz0227/OP-Packages"
          headers=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer $REPO_TOKEN"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )
          status="$(curl --fail-with-body --silent --show-error --retry 3 "${headers[@]}" "$api/actions/runs?per_page=1" |
            jq -r '.workflow_runs[0].status // "unknown"')"

          if [[ "$status" != "queued" && "$status" != "in_progress" ]]; then
            curl --fail-with-body --silent --show-error --retry 3 -X POST "${headers[@]}" --data '{"event_type":"update"}' "$api/dispatches"
          fi

      - name: Free disk space
        if: env.FREE_UP_DISK == 'true'
        uses: coder-xiaomo/free-disk-space@14d098403ea40da32e17b647317b09061853e911 # v1.4.0
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -Eeuo pipefail
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install --no-install-recommends aria2 bison build-essential ccache clang device-tree-compiler dwarves file flex g++ g++-multilib gawk gcc-multilib gettext git jq libboost-filesystem-dev libboost-system-dev libelf-dev libfuse-dev libgmp3-dev libmpc-dev libncurses-dev libpcre3-dev libpython3-dev libssl-dev libv4l-dev llvm python3-pyelftools python3-setuptools qemu-utils rename rsync swig unzip wget zlib1g-dev
          sudo -E apt-get -qq clean

          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Set build metadata
        env:
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          set -Eeuo pipefail
          {
            printf 'BUILD_DATE=%s\n' "$(date +'%d.%m.%Y_%H-%M')"
            printf 'BUILD_DATE_DISPLAY=%s\n' "$(date +'%Y-%m-%d')"
          } >> "$GITHUB_ENV"

          version="$(grep -Eo '(^| )[0-9]+([.][0-9]+)+' <<< "$EVENT_ACTION" | head -n 1 | xargs || true)"
          printf 'VERSION=%s\n' "${version:-$(date +'%m.%d')}" >> "$GITHUB_ENV"

      - name: Clone OpenWrt source
        run: |
          set -Eeuo pipefail

          if [[ "$REPO_BRANCH" =~ ^[0-9a-fA-F]{40}$ ]]; then
            git init openwrt
            git -C openwrt remote add origin "$REPO_URL"
            git -C openwrt fetch --depth 1 origin "$REPO_BRANCH"
            git -C openwrt checkout --detach FETCH_HEAD
          else
            git clone --depth 1 --single-branch --branch "$REPO_BRANCH" "$REPO_URL" openwrt
          fi

          source_commit="$(git -C openwrt rev-parse HEAD)"
          printf 'SOURCE_COMMIT=%s\n' "$source_commit" >> "$GITHUB_ENV"
          echo "Base source: $REPO_URL@$source_commit"

      - name: Move build directories to /mnt
        if: env.FREE_UP_DISK == 'true'
        run: |
          set -Eeuo pipefail
          sudo install -d -m 0777 /mnt/openwrt/dl /mnt/openwrt/staging_dir /mnt/openwrt/build_dir
          ln -s /mnt/openwrt/dl openwrt/dl
          ln -s /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -s /mnt/openwrt/build_dir openwrt/build_dir

      - name: Load custom configuration
        run: |
          set -Eeuo pipefail

          cp -a devices/common/. openwrt/
          cp -a devices openwrt/
          cd openwrt

          rm -f .config
          bash "devices/common/$DIY_SH"

          cp -f "devices/common/$CONFIG_FILE" .config
          target_config="devices/$TARGET/$CONFIG_FILE"
          if [[ -f "$target_config" ]]; then
            printf '\n' >> .config
            cat "$target_config" >> .config
          fi

          target_diy="devices/$TARGET/$DIY_SH"
          [[ ! -f "$target_diy" ]] || bash "$target_diy"

          [[ ! -d diy ]] || cp -a diy/. ./

      - name: Apply repository patches
        run: |
          set -Eeuo pipefail
          cd openwrt

          patch_dir="devices/$TARGET/patches"
          mkdir -p "$patch_dir"
          cp -a --update=none devices/common/patches/. "$patch_dir/"

          while IFS= read -r -d '' file; do
            echo "Applying binary patch: $file"
            git apply --check "$file"
            git apply "$file"
          done < <(find "$patch_dir" -maxdepth 1 -type f -name '*.bin.patch' -print0 | sort -z)

          while IFS= read -r -d '' file; do
            echo "Reverting patch: $file"
            patch --batch --forward --merge --no-backup-if-mismatch --reject-file=- -R -p1 < "$file"
          done < <(find "$patch_dir" -maxdepth 1 -type f -name '*.revert.patch' -print0 | sort -z)

          while IFS= read -r -d '' file; do
            echo "Applying patch: $file"
            patch --batch --forward --merge --no-backup-if-mismatch --reject-file=- -p1 < "$file"
          done < <(find "$patch_dir" -maxdepth 1 -type f -name '*.patch' ! -name '*.revert.patch' ! -name '*.bin.patch' -print0 | sort -z)

          if find . -type f \( -name '*.rej' -o -name '*.orig' \) -print -quit | grep -q .; then
            echo "::error::Patch backups or rejects were generated"
            find . -type f \( -name '*.rej' -o -name '*.orig' \) -print
            exit 1
          fi

          kernel_patchver="$(sed -n 's/^KERNEL_PATCHVER:=//p' target/linux/x86/Makefile | head -n 1)"
          [[ -n "$kernel_patchver" ]] || {
            echo "::error::Unable to determine x86 kernel series"
            exit 1
          }

          set_kernel_option() {
            local file="$1" option="$2" value="$3"
            if grep -qE "^(# )?${option}(=| is not set)" "$file"; then
              sed -i -E "s/^(# )?${option}(=.*| is not set)$/${option}=${value}/" "$file"
            else
              printf '%s=%s\n' "$option" "$value" >> "$file"
            fi
          }

          x86_config="target/linux/x86/config-${kernel_patchver}"
          generic_config="target/linux/generic/config-${kernel_patchver}"
          for governor in POWERSAVE USERSPACE ONDEMAND CONSERVATIVE; do
            set_kernel_option "$x86_config" "CONFIG_CPU_FREQ_GOV_${governor}" y
          done
          set_kernel_option "$generic_config" CONFIG_CRYPTO_CHACHA20POLY1305 y
          set_kernel_option "$generic_config" CONFIG_FAT_DEFAULT_IOCHARSET '"utf8"'

      - name: Configure custom APK signing keys
        env:
          APK_PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          APK_PUBLIC_KEY: ${{ secrets.APK_PUBLIC_KEY }}
        run: |
          set -Eeuo pipefail
          cd openwrt

          if [[ -n "$APK_PRIVATE_KEY" && -n "$APK_PUBLIC_KEY" ]]; then
            umask 077
            printf '%s\n' "$APK_PRIVATE_KEY" > private-key.pem
            printf '%s\n' "$APK_PUBLIC_KEY" > public-key.pem
            chmod 0644 public-key.pem
          elif [[ -n "$APK_PRIVATE_KEY" || -n "$APK_PUBLIC_KEY" ]]; then
            echo "::error::APK_PRIVATE_KEY and APK_PUBLIC_KEY must be configured together"
            exit 1
          else
            echo "Custom APK keys are not configured; OpenWrt will generate build keys"
          fi

      - name: Generate final configuration
        run: |
          set -Eeuo pipefail
          cd openwrt
          make defconfig

          grep -q '^CONFIG_TARGET_x86=y$' .config
          grep -q '^CONFIG_TARGET_x86_64=y$' .config

          ./scripts/diffconfig.sh

      - name: Detect kernel version
        run: |
          set -Eeuo pipefail
          cd openwrt

          base="$(sed -n 's/^KERNEL_PATCHVER:=//p' target/linux/x86/Makefile | head -n 1)"
          kernel_file="target/linux/generic/kernel-${base}"
          suffix="$(sed -n "s/^LINUX_VERSION-${base}[[:space:]]*=[[:space:]]*//p" "$kernel_file" | head -n 1)"
          [[ -n "$base" && -n "$suffix" ]] || {
            echo "::error::Unable to determine kernel version from $kernel_file"
            exit 1
          }

          kernel_version="${base}${suffix}"
          kernel_source_commit="$(cat .kernel-source-commit 2>/dev/null || printf '%s' "$SOURCE_COMMIT")"
          kernel_packages_source_commit="$(cat .kernel-packages-source-commit 2>/dev/null || printf 'unknown')"
          {
            printf 'KERNEL_VER=%s\n' "$kernel_version"
            printf 'KERNEL_SOURCE_COMMIT=%s\n' "$kernel_source_commit"
            printf 'KERNEL_PACKAGES_SOURCE_COMMIT=%s\n' "$kernel_packages_source_commit"
          } >> "$GITHUB_ENV"
          echo "Kernel: $kernel_version ($kernel_source_commit)"

      - name: Restore build cache
        uses: stupidloud/cachewrtbuild@b729f807837dbc3455d02fd35192660d9b662121
        with:
          ccache: "true"
          mixkey: x86_64-${{ env.KERNEL_VER }}
          clean: ${{ contains(env.BUILD_OPTIONS, 'nocache') }}
          prefix: ${{ github.workspace }}/openwrt

      - name: Compile firmware
        id: compile
        run: |
          set -Eeuo pipefail
          cd openwrt

          jobs="$(nproc)"
          echo "Compiling with $jobs parallel jobs"
          if ! make -j"$jobs"; then
            echo "::warning::Parallel build failed; retrying serially with verbose output"
            make -j1 V=s 2>&1 | tee error.log
          fi

          rm -f staging_dir/toolchain-*/bin/*openwrt-linux-musl-lto-dump
          rm -rf staging_dir/toolchain-*/initial
          df -hT

      - name: Collect build outputs
        run: |
          set -Eeuo pipefail
          cd openwrt

          target_dir="$(find bin/targets -mindepth 2 -maxdepth 2 -type d -print -quit)"
          [[ -n "$target_dir" ]] || {
            echo "::error::No target output directory was produced"
            exit 1
          }

          cp .config "$target_dir/${TARGET}.config"
          kernel_config="$(find build_dir -path '*/linux-*/linux-*/.config' -type f -print -quit)"
          [[ -z "$kernel_config" ]] || cp "$kernel_config" "$target_dir/${TARGET}_kernel.config"

      - name: Stage release files
        if: env.UPLOAD_FIRMWARE_FOR_RELEASE == 'true'
        run: |
          set -Eeuo pipefail
          destination="firmware/$TARGET"
          mkdir -p "$destination"

          release_patterns=( -name '*combined*' -o -name '*rootfs*' -o -name '*imagebuilder*' -o -name '*.bin' -o -name '*.bin.gz' -o -name 'sha256sums' -o -name '*.buildinfo' -o -name 'profiles.json' )
          while IFS= read -r -d '' file; do
            cp -a "$file" "$destination/"
          done < <(find openwrt/bin/targets -mindepth 3 -maxdepth 3 -type f \( "${release_patterns[@]}" \) -print0)

          if [[ -z "$(find "$destination" -type f -print -quit)" ]]; then
            echo "::error::No release files matched the staging rules"
            exit 1
          fi

      - name: Deploy targets to primary server
        if: env.HAS_SSH_KEY == 'true' && !contains(env.BUILD_OPTIONS, 'noser')
        continue-on-error: true
        uses: easingthemes/ssh-deploy@2cc5b27bf3029d0455dd5e09fe02633904031447 # v6.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: >-
            -avzr
            --exclude='*erofs*'
            --exclude='*squashfs*'
            --exclude='*targz*'
            --exclude='*imagebuilder*'
          SOURCE: openwrt/bin/targets
          REMOTE_HOST: ${{ secrets.HOST }}
          REMOTE_PORT: ${{ secrets.PORT }}
          REMOTE_USER: ${{ secrets.SERVER_USERNAME }}
          TARGET: /www/wwwroot/op.miaogongzi.cc/25.12

      - name: Upload firmware artifact
        if: env.UPLOAD_FIRMWARE_FOR_ARTIFACT == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.VERSION }}_${{ env.TARGET }}
          path: openwrt/bin/targets/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Create release notes
        if: env.HAS_RELEASE_TOKEN == 'true' && env.UPLOAD_FIRMWARE_FOR_RELEASE == 'true'
        run: |
          {
            printf 'Target: %s\n' "$TARGET"
            printf 'Kernel: %s\n' "$KERNEL_VER"
            printf 'Base source: %s@%s\n' "$REPO_URL" "$SOURCE_COMMIT"
            printf 'Kernel source commit: %s\n\n' "$KERNEL_SOURCE_COMMIT"
            printf 'Kernel package source commit: %s\n\n' "$KERNEL_PACKAGES_SOURCE_COMMIT"
            printf 'CDN: https://op.miaogongzi.cc/25.12/targets/x86/64/\n'
          } > release.txt

      - name: Publish GitHub release
        if: env.HAS_RELEASE_TOKEN == 'true' && env.UPLOAD_FIRMWARE_FOR_RELEASE == 'true'
        continue-on-error: true
        uses: softprops/action-gh-release@2bb465e97f322d3cb2a965294d483e0d26a67aa9 # v3.0.1
        with:
          token: ${{ secrets.TOKEN_MGZ0227 }}
          files: |
            firmware/${{ env.TARGET }}/*
            openwrt/error*.log
          name: ${{ env.BUILD_DATE_DISPLAY }} ${{ env.TARGET }} kernel ${{ env.KERNEL_VER }}
          tag_name: ${{ env.BUILD_DATE }}_${{ env.TARGET }}
          body_path: release.txt

      - name: Deploy targets to secondary server
        if: env.HAS_SSH_KEY == 'true' && !contains(env.BUILD_OPTIONS, 'noser')
        continue-on-error: true
        uses: easingthemes/ssh-deploy@2cc5b27bf3029d0455dd5e09fe02633904031447 # v6.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: -avr --timeout=600
          SSH_CMD_ARGS: -o ServerAliveInterval=30 -o ServerAliveCountMax=10
          SOURCE: openwrt/bin/targets
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          REMOTE_USER: ${{ secrets.SERVER_USERNAME }}
          TARGET: /www/wwwroot/op.miaogongzi.cc/25.12

      - name: Send Telegram result
        if: always() && env.HAS_TELEGRAM == 'true' && !contains(env.BUILD_OPTIONS, 'notg')
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
        run: |
          if [[ "$COMPILE_OUTCOME" == "success" ]]; then
            message="OpenWrt $VERSION $TARGET build succeeded"
          else
            message="OpenWrt $VERSION $TARGET build failed"
          fi
          curl --fail-with-body --silent --show-error --retry 3 --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" --data-urlencode "text=$message" "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage"

      - name: Delete old workflow runs
        if: always() && env.HAS_RELEASE_TOKEN == 'true'
        continue-on-error: true
        uses: mgz0227/delete-workflow-runs@09cf4452c0d19a5190fc977d9bacae384e0de9a8 # v1.0
        with:
          token: ${{ secrets.TOKEN_MGZ0227 }}
          retain_days: 100
          keep_minimum_runs: 1

      - name: Remove old releases
        if: always() && env.HAS_RELEASE_TOKEN == 'true' && env.UPLOAD_FIRMWARE_FOR_RELEASE == 'true'
        continue-on-error: true
        uses: mgz0227/delete-older-releases@dfbe6be2a006e9475dfcbe5b8d201f1824c2a9fe # v0.3.4
        with:
          keep_latest: 15
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_MGZ0227 }}
